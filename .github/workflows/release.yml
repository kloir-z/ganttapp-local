# タグ push（v*）で単一HTMLをビルドして GitHub Release を作成する。
# - SHA-256 チェックサムを同梱
# - actions/attest-build-provenance でビルド来歴を証明
#   （`gh attestation verify <file> --repo kloir-z/ganttapp-local` で
#    「このファイルはこのリポジトリのこのコミットから GitHub Actions 上で
#    ビルドされた」ことを誰でも検証できる）
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build:singlefile
      - name: Package artifact
        run: |
          mkdir -p release
          cp dist-single/index.html "release/gantt-local-${GITHUB_REF_NAME}.html"
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/gantt-local-*.html
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
